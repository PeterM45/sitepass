name: Publish

# Publish to npm with provenance when a version tag (vX.Y.Z) is pushed.
# Requires an NPM_TOKEN repository secret (an npm automation/granular token with
# publish rights). Provenance is generated from this CI run via OIDC.
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # don't leave repo creds on the runner
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      # Refuse a tag that doesn't match package.json, so a mistagged push can't
      # publish a mismatched version (or provenance pointing at the wrong ref).
      - name: Verify tag matches package.json version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME#v}" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $version" >&2
            exit 1
          fi
      - run: bun run typecheck
      - run: bun run check
      - run: node ./node_modules/.bin/vitest run
      - run: bun run build
      - run: bun run publint
      - run: bun run attw
      # Pack once with scripts disabled (prepack would otherwise rebuild dist
      # after validation), smoke-test that exact tarball, then publish the same
      # file: npm runs no build scripts when publishing a tarball, so the bytes
      # that were validated are the bytes that ship.
      - run: npm pack --ignore-scripts
      - run: node scripts/smoke-dist.mjs ./sitepass-*.tgz
      # Pinned npm (the version that published v0.2.0) instead of a floating
      # @latest with the publish token. It must stay new enough to treat the
      # Sigstore transparency-log 409 (TLOG_CREATE_ENTRY_ERROR) as the
      # idempotent success it is — the runner's bundled npm aborts provenance
      # publishing when npm's own retry resubmits an attestation the first
      # request already logged.
      - run: npm install -g npm@11.16.0
      # npm (not bun) publishes with provenance.
      - run: npm publish ./sitepass-*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
