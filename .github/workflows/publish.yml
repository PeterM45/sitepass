name: Publish

# Publish to npm with provenance when a version tag (vX.Y.Z) is pushed.
# Requires an NPM_TOKEN repository secret (an npm automation/granular token with
# publish rights). Provenance is generated from this CI run via OIDC.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run check
      - run: node ./node_modules/.bin/vitest run
      # npm (not bun) publishes with provenance; prepack runs tsup to build dist.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
